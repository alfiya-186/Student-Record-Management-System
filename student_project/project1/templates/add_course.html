{% extends 'base.html' %}

{% block content %}
<div class="glass max-w-md mx-auto p-2-5 my-2">
    <div class="page-header" style="margin-bottom: 2rem;">
        <div>
            <h2 class="text-2xl font-bold">New Program</h2>
            <p class="text-muted text-sm">Establish a new academic program in the catalog.</p>
        </div>
        <a href="/manage_courses/" class="btn btn-outline text-sm">Back</a>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Program Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Master of Data Science" required>
        </div>
        
        <div class="form-group">
            <label>Institutional Code</label>
            <input type="text" name="code" class="form-control" placeholder="e.g. MDS-001" required>
        </div>
        
        <div class="form-group">
            <label>Academic Duration (Years)</label>
            <input type="number" name="duration" class="form-control" min="1" max="10" required>
        </div>
        
        <div class="form-group">
            <label>Core Subjects (Comma separated)</label>
            <input type="text" name="subjects" class="form-control" placeholder="Math, Ethics, Logic...">
        </div>
        
        <button type="submit" class="btn btn-primary w-full mt-1">Register Program to Catalog</button>
    </form>
</div>
{% endblock %}
